version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: spatial_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spatial_api"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/spatial_api
      GRAPH_CACHE_DIR: /app/graph_cache
    volumes:
      - graph_cache:/app/graph_cache
      - .:/app          # hot-reload in dev
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
  graph_cache:
